<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | AniTrack</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../global.css">
  <script src="../scripts/features/profile.js"></script>
  <script src="../scripts/core/loadComponent.js"></script>
  <script src="../scripts/features/favorites.js"></script>
  <script src="../scripts/features/taste.js"></script>
  <script src="../scripts/core/populateFeed.js"></script>
  <script src="../scripts/utils/quickEditor.js"></script>
  <script src="../scripts/utils/renderMediaList.js"></script>
</head>

<body class="min-h-screen bg-[#0b1622] text-slate-300">

  <div id="navbar-placeholder" class="sticky top-0 z-50"></div>

  <div id="profile-container" class="invisible">
    <div class="relative w-full h-75 md:h-100">
      <img id="profile-banner" src="" alt="" class="object-top w-full h-full object-cover bg-[#151f2e]">
      <div class="absolute inset-0 bg-linear-to-t from-[#0b1622] to-transparent"></div>
    </div>

    <div class="max-w-375 mx-auto px-4 sm:px-6 lg:px-8">
      <div class="relative -mt-24 pb-8">
        <div class="flex flex-col md:flex-row items-end md:items-center space-y-4 md:space-y-0 md:space-x-6">
          <div class="relative group">
            <img id="profile-avatar" src="" alt=""
              class="w-32 h-32 md:w-40 md:h-40 rounded-xl border-4 border-[#0b1622] shadow-2xl object-cover bg-[#151f2e]">
            <div id="role-badge"
              class="hidden absolute -bottom-2 -right-2 bg-accent text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg uppercase tracking-tighter">
              Developer</div>
          </div>
          <div class="flex-1 text-center md:text-left">
            <h1 id="profile-display-name" class="text-3xl md:text-4xl font-bold text-white mb-1"></h1>
            <p id="profile-bio" class="text-slate-400 text-sm max-w-xl"></p>
          </div>
          <div class="flex space-x-3">
            <button
              class="bg-accent hover:bg-opacity-90 text-white px-6 py-2 rounded-lg font-bold text-sm transition-all shadow-lg shadow-blue-500/10">Follow</button>
            <button class="bg-slate-800 hover:bg-slate-700 text-white p-2 rounded-lg transition-all"><i
                class="fa-solid fa-ellipsis"></i></button>
          </div>
        </div>
      </div>

      <div
        class="profile-tabs flex space-x-8 border-b border-slate-800 mb-8 overflow-x-auto whitespace-nowrap scrollbar-hide">
        <button class="tab-btn pb-4 font-semibold text-white tab-active"
          onclick="switchTab('overview')">Overview</button>
        <button class="tab-btn pb-4 font-semibold hover:text-white transition-colors"
          onclick="switchTab('anime')">Anime</button>
        <button class="tab-btn pb-4 font-semibold hover:text-white transition-colors"
          onclick="switchTab('manga')">Manga</button>
        <button class="tab-btn pb-4 font-semibold hover:text-white transition-colors"
          onclick="switchTab('lightnovels')">Light Novels</button>
        <button class="tab-btn pb-4 font-semibold hover:text-white transition-colors"
          onclick="switchTab('visualnovels')">Visual Novels</button>
        <button class="tab-btn pb-4 font-semibold hover:text-white transition-colors"
          onclick="switchTab('favorites')">Favorites</button>
        <button class="tab-btn pb-4 font-semibold hover:text-white transition-colors"
          onclick="switchTab('stats')">Stats</button>
        <button class="tab-btn pb-4 font-semibold hover:text-white transition-colors"
          onclick="switchTab('social')">Social</button>
      </div>

      <div id="profile-content-placeholder" class="py-8 min-h-100"></div>
    </div>
  </div>

  <div id="not-found-container" class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
    <i class="fa-solid fa-ghost text-6xl text-slate-800 mb-6"></i>
    <h1 class="text-3xl font-bold text-white mb-2">User Not Found</h1>
    <p class="text-slate-500 max-w-md mb-8">We couldn't find a user named "<span id="attempted-user"
        class="text-slate-300 font-mono"></span>".</p>
    <a href="/" class="bg-accent text-white px-8 py-3 rounded-xl font-bold transition-all hover:scale-105">Return
      Home</a>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    const initProfile = async () => {
      //const urlParams = new URLSearchParams(window.location.search);
      // const username = urlParams.get('user') || 'shaetsu';
      const path = window.location.pathname;

      // Split by '/' and filter out empty strings
      const pathParts = path.split('/').filter(part => part.length > 0);

      // Get the last part of the URL as the username
      const username = pathParts[pathParts.length - 1];
      const profileContainer = document.getElementById('profile-container');
      const notFoundContainer = document.getElementById('not-found-container');

      try {
        const response = await fetch(`/data/users/${username}/profile.json`);
        if (!response.ok) throw new Error('User not found');
        const data = await response.json();

        // Set basic profile info
        document.getElementById('profile-display-name').innerText = data.display_name;
        document.getElementById('profile-bio').innerText = data.bio || "";
        document.getElementById('profile-avatar').src = `../assets/profile/${username}/avatar.jpg`;
        document.getElementById('profile-banner').src = `../assets/profile/${username}/banner.jpg`;

        if (username === 'shaetsu') document.getElementById('role-badge').classList.remove('hidden');
        document.title = `${username}'s Profile | AniTrack`;
        profileContainer.classList.remove('invisible');

        // Load static components
        await Promise.all([
          loadComponent('navbar-placeholder', '/components/common/navbar.html'),
          loadComponent('footer-placeholder', '/components/common/footer.html')
        ]);

        // CRITICAL: Await the overview content so the canvas/heatmap elements exist in DOM
        await loadComponent('profile-content-placeholder', '/components/profile/overview.html');

        // Now initialize features after elements are guaranteed to be in the DOM
        if (window.initializeFavorites) window.initializeFavorites(username);
        if (window.initializeTasteChart) window.initializeTasteChart(username);
        if (window.populateActivityFeed) await window.populateActivityFeed(username);
        if (window.setupProfileTabs) window.setupProfileTabs(username);

      } catch (e) {
        profileContainer.classList.add('hidden');
        notFoundContainer.classList.remove('hidden');
        document.getElementById('attempted-user').innerText = username;
      }
    };

    window.onload = initProfile;
  </script>
</body>

</html>
