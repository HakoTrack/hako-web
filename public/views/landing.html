<div id="landing-view"
  class="bg-hero min-h-screen flex flex-col px-6 py-8 md:py-12 opacity-0 transition-opacity duration-1000">
  <div class="grow flex flex-col items-center justify-center text-center">
    <main class="max-w-4xl mx-auto">
      <h1 id="hero-title"
        class="text-6xl md:text-8xl font-extrabold mb-6 tracking-tighter flex items-center justify-center gap-4 md:gap-6">
        <span class="font-['Zen_Antique'] text-indigo-400">箱</span>
        <span id="hako-text" class="font-['Zen_Antique'] text-white overflow-hidden"
          style="width: 0; transition: width 1s ease-out;">Hako</span>
      </h1>
      <div id="hero-content" class="opacity-0 transition-opacity duration-1000">
        <p class="text-lg md:text-xl text-slate-300 mb-10 max-w-lg mx-auto leading-relaxed">
          A box of everything Japanese media.
        </p>
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 md:gap-6">
          <button id="landing-login"
            class="w-full sm:w-48 bg-white/5 backdrop-blur-xl text-white py-4 rounded-xl text-center font-bold text-lg border border-white/10 hover:bg-white/10 transition-all">
            Login
          </button>
          <button id="landing-signup"
            class="w-full sm:w-48 bg-white/5 backdrop-blur-xl text-white py-4 rounded-xl text-center font-bold text-lg border border-white/10 hover:bg-white/10 transition-all">
            Sign Up
          </button>
        </div>
      </div>
    </main>
  </div>

  <footer class="mt-auto pt-12 text-center pb-8 opacity-0 transition-opacity duration-1000" id="hero-footer">
    <p class="text-[10px] uppercase text-slate-500 opacity-60 leading-loose mx-auto tracking-widest px-4">
      An in-development database, tracking platform, and indie social media for anime, manga, light novels, and visual
      novels.
    </p>
  </footer>
</div>

<style>
  .bg-hero {
    background: linear-gradient(rgba(26, 27, 38, 0.6), rgba(11, 16, 22, 1)), var(--hero-bg, #0b0c10);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
</style>

<script>
  (async function initLanding() {
    console.log("Landing page script started.");

    const view = document.getElementById('landing-view');
    const hakoText = document.getElementById('hako-text');
    const content = document.getElementById('hero-content');
    const footer = document.getElementById('hero-footer');

    if (!view || !hakoText || !content || !footer) {
      console.error("Critical DOM elements missing:", {view, hakoText, content, footer});
      return;
    }

    // 1. Paint Hako text
    try {
      hakoText.style.width = hakoText.scrollWidth + 'px';
      console.log("Text paint initiated.");
    } catch (e) {
      console.error("Text paint failed:", e);
    }

    // 2. Load background image
    if (window.HakoImage) {
      console.log("HakoImage found, fetching background.");
      const heroUrl = window.HakoImage.get('landing.jpg', {w: 1600, f: 'webp', q: 80});
      console.log("Image URL:", heroUrl);

      const img = new Image();
      img.onload = () => {
        console.log("Image loaded successfully.");
        view.style.setProperty('--hero-bg', `url('${heroUrl}')`);
        view.classList.remove('opacity-0');

        // 3. Fade in remaining elements
        setTimeout(() => {
          content.classList.remove('opacity-0');
          footer.classList.remove('opacity-0');
        }, 500);
      };
      img.onerror = (err) => {
        console.error("Image failed to load:", err);
        // Force reveal so the page isn't blank
        view.classList.remove('opacity-0');
        content.classList.remove('opacity-0');
        footer.classList.remove('opacity-0');
      };
      img.src = heroUrl;
    } else {
      console.error("HakoImage utility missing from window!");
      // Force reveal so the page isn't blank
      view.classList.remove('opacity-0');
      content.classList.remove('opacity-0');
      footer.classList.remove('opacity-0');
    }
  })();
</script>
