<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hako | Anime & Manga Tracking</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/global.css">

  <!-- Core Scripts (Global) -->
  <script src="/scripts/core/loadComponent.js"></script>
  <script src="/scripts/core/populateFeed.js"></script>

  <!-- Feature Scripts (Global) -->
  <script src="/scripts/features/profile.js"></script>
  <script src="/scripts/features/favorites.js"></script>
  <script src="/scripts/features/taste.js"></script>
  <script src="/scripts/utils/toneCalc.js"></script>
  <script src="/scripts/utils/quickEditor.js"></script>
  <script src="/scripts/utils/renderMediaList.js"></script>
</head>

<body class="min-h-screen bg-[#0b1622] text-slate-300">

  <div id="navbar-placeholder" class="sticky top-0 z-50"></div>

  <main id="app-view"></main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import {handleRouting} from '/src/core/router.js';

    // Handle initial load and back/forward navigation
    window.addEventListener('popstate', handleRouting);
    window.addEventListener('DOMContentLoaded', handleRouting);

    // Intercept clicks on links for SPA routing
    document.addEventListener('click', (e) => {
      const target = e.target.closest('a');
      if (target && target.href.startsWith(window.location.origin)) {
        e.preventDefault();
        window.history.pushState({}, '', target.getAttribute('href'));
        handleRouting();
      }
    });
  </script>
</body>

</html>
