<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hako | Anime & Manga Tracking</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/global.css">

  <!-- Core Scripts -->
  <script src="/scripts/core/loadComponent.js"></script>
  <script src="/scripts/core/populateFeed.js"></script>

  <!-- Feature Scripts -->
  <script src="/scripts/features/profile.js"></script>
  <script src="/scripts/features/favorites.js"></script>
  <script src="/scripts/features/taste.js"></script>
  <script src="/scripts/utils/toneCalc.js"></script>
  <script src="/scripts/utils/quickEditor.js"></script>
  <script src="/scripts/utils/renderMediaList.js"></script>
</head>

<body class="min-h-screen bg-[#0b1622] text-slate-300">

  <div id="navbar-placeholder" class="sticky top-0 z-50"></div>

  <main id="app-view"></main>

  <div id="footer-placeholder"></div>

  <script>
    const navigate = async () => {
      const path = window.location.pathname;
      const pathParts = path.split('/').filter(p => p && !p.endsWith('.html'));

      // Load shared layout components
      await Promise.all([
        loadComponent('navbar-placeholder', '/components/common/navbar.html'),
        loadComponent('footer-placeholder', '/components/common/footer.html')
      ]);

      // Determine which view to load
      // For now, we support /profile/:username and default to feed
      if (pathParts.includes('profile')) {
        const username = pathParts[pathParts.indexOf('profile') + 1] || 'shaetsu';
        await loadComponent('app-view', '/profile/profile.html');
        if (window.initProfile) {
          await window.initProfile(username);
        }
      } else if (pathParts.length === 0 || pathParts[0] === 'feed') {
        // Activity Feed
        await loadComponent('app-view', '/views/feed.html');
        if (window.populateActivityFeed) {
          await window.populateActivityFeed('shaetsu');
        }
      } else {
        // 404 Page
        await loadComponent('app-view', '/views/404.html');
        document.title = '404 - Page Not Found | Hako';
      }
    };

    // Handle initial load and back/forward navigation
    window.addEventListener('popstate', navigate);
    window.addEventListener('DOMContentLoaded', navigate);
  </script>
</body>

</html>
