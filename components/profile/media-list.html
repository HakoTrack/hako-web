<div id="media-list-wrapper" class="flex flex-col lg:flex-row gap-8 mb-12 animate-in fade-in duration-300">
  <!-- Left Column: Sidebar -->
  <aside class="lg:w-[20%] order-2 lg:order-1">
    <div class="sticky top-24 space-y-6">

      <!-- Sorting & Filters -->
      <div class="bg-card rounded-xl p-5 space-y-4">
        <div>
          <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 block mb-2">Search List</label>
          <div class="relative">
            <input type="text" placeholder="Filter titles..."
              class="w-full bg-[#0b1622] border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-300 focus:outline-none focus:ring-1 focus:ring-accent pl-9">
            <i class="fa-solid fa-search absolute left-3 top-2.5 text-slate-600 text-xs"></i>
          </div>
        </div>

        <div>
          <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 block mb-2">Sort By</label>
          <select id="sort-select"
            class="w-full bg-[#0b1622] border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-300 focus:outline-none focus:ring-1 focus:ring-accent"
            onchange="const type = document.getElementById('media-list-wrapper').dataset.type; const activeBtn = document.querySelector('.category-btn.border-accent'); const activeStatus = activeBtn ? activeBtn.dataset.status : 'all'; window.renderMediaList(type, 'media-list-container', this.value, activeStatus)">
            <option>Title</option>
            <option>Score</option>
            <option>Progress</option>
            <option>Last Updated</option>
          </select>
        </div>
      </div>

      <!-- Status Categories -->
      <div id="media-categories-sidebar" class="bg-card rounded-xl overflow-hidden">
        <div class="p-4">
          <h3 id="category-header" class="text-xs font-bold uppercase tracking-widest text-white flex items-center">
            <i class="fa-solid fa-layer-group text-accent mr-2"></i> Categories
          </h3>
        </div>
        <div class="flex flex-col" id="status-button-group">
          <button data-status="all"
            class="category-btn flex items-center justify-between px-4 py-3 text-sm font-medium text-white bg-slate-800/50 border-l-4 border-accent transition-all w-full"
            onclick="window.renderMediaList(document.getElementById('media-list-wrapper').dataset.type, 'media-list-container', document.getElementById('sort-select').value, 'all')">
            <span>All Entries</span>
            <span class="count text-xs text-slate-500 bg-[#0b1622] px-2 py-0.5 rounded">-</span>
          </button>
          <button data-status="current"
            class="category-btn flex items-center justify-between px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/30 border-l-4 border-transparent transition-all w-full"
            onclick="window.renderMediaList(document.getElementById('media-list-wrapper').dataset.type, 'media-list-container', document.getElementById('sort-select').value, 'current')">
            <span class="active-label">Watching</span>
            <span class="count text-xs text-slate-500">-</span>
          </button>
          <button data-status="completed"
            class="category-btn flex items-center justify-between px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/30 border-l-4 border-transparent transition-all w-full"
            onclick="window.renderMediaList(document.getElementById('media-list-wrapper').dataset.type, 'media-list-container', document.getElementById('sort-select').value, 'completed')">
            <span>Completed</span>
            <span class="count text-xs text-slate-500">-</span>
          </button>
          <button data-status="paused"
            class="category-btn flex items-center justify-between px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/30 border-l-4 border-transparent transition-all w-full"
            onclick="window.renderMediaList(document.getElementById('media-list-wrapper').dataset.type, 'media-list-container', document.getElementById('sort-select').value, 'paused')">
            <span>Paused</span>
            <span class="count text-xs text-slate-500">-</span>
          </button>
          <button data-status="dropped"
            class="category-btn flex items-center justify-between px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/30 border-l-4 border-transparent transition-all w-full"
            onclick="window.renderMediaList(document.getElementById('media-list-wrapper').dataset.type, 'media-list-container', document.getElementById('sort-select').value, 'dropped')">
            <span>Dropped</span>
            <span class="count text-xs text-slate-500">-</span>
          </button>
          <button data-status="planning"
            class="category-btn flex items-center justify-between px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/30 border-l-4 border-transparent transition-all w-full"
            onclick="window.renderMediaList(document.getElementById('media-list-wrapper').dataset.type, 'media-list-container', document.getElementById('sort-select').value, 'planning')">
            <span>Planning</span>
            <span class="count text-xs text-slate-500">-</span>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Right Column: Content -->
  <div class="lg:w-[80%] order-1 lg:order-2 space-y-8">
    <div id="media-list-container" class="space-y-10 min-h-[400px]">
      <div class="flex items-center justify-center p-20">
        <i class="fa-solid fa-circle-notch fa-spin text-accent text-2xl"></i>
      </div>
    </div>
  </div>
</div>
