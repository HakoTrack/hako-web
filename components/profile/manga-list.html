<div class="flex flex-col lg:flex-row gap-8 mb-12 animate-in fade-in duration-300">
  <!-- Left Column: Sidebar (20%) -->
  <aside class="lg:w-[20%] order-2 lg:order-1">
    <div class="sticky top-24 space-y-6">

      <!-- Sorting & Filters -->
      <div class="bg-card rounded-xl border border-slate-800 p-5 space-y-4">
        <!-- Search Box -->
        <div>
          <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 block mb-2">Search List</label>
          <div class="relative">
            <input type="text" placeholder="Filter titles..."
              class="w-full bg-[#0b1622] border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-300 focus:outline-none focus:ring-1 focus:ring-accent pl-9">
            <i class="fa-solid fa-search absolute left-3 top-2.5 text-slate-600 text-xs"></i>
          </div>
        </div>

        <!-- Sort Dropdown -->
        <div>
          <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 block mb-2">Sort By</label>
          <select id="sort-select"
            class="w-full bg-[#0b1622] border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-300 focus:outline-none focus:ring-1 focus:ring-accent"
            onchange="window.renderMediaList('manga', 'manga-list-container', this.value, document.querySelector('#manga-categories-sidebar button.text-white')?.dataset.status || 'all')">
            <option>Title</option>
            <option>Score</option>
            <option>Progress</option>
            <option>Last Updated</option>
          </select>
        </div>
      </div>

      <!-- Status Categories -->
      <div id="manga-categories-sidebar" class="bg-card rounded-xl border border-slate-800 overflow-hidden">
        <div class="p-4 border-b border-slate-800/50">
          <h3 class="text-xs font-bold uppercase tracking-widest text-white flex items-center">
            <i class="fa-solid fa-layer-group text-accent mr-2"></i> Categories
          </h3>
        </div>
        <div class="flex flex-col">
          <button data-status="all"
            class="flex items-center justify-between px-4 py-3 text-sm font-medium text-white hover:bg-slate-800/50 transition-colors border-l-4 border-accent bg-slate-800/30">
            <span>All Manga</span>
            <span class="count text-xs text-slate-500 bg-[#0b1622] px-2 py-0.5 rounded">28</span>
          </button>
          <button data-status="reading"
            class="flex items-center justify-between px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 transition-colors border-l-4 border-transparent">
            <span>Reading</span>
            <span class="count text-xs text-slate-500">8</span>
          </button>
          <button data-status="completed"
            class="flex items-center justify-between px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 transition-colors border-l-4 border-transparent">
            <span>Completed</span>
            <span class="text-xs text-slate-500">15</span>
          </button>
          <button data-status="paused"
            class="flex items-center justify-between px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 transition-colors border-l-4 border-transparent">
            <span>Paused</span>
            <span class="count text-xs text-slate-500">2</span>
          </button>
          <button data-status="dropped"
            class="flex items-center justify-between px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 transition-colors border-l-4 border-transparent">
            <span>Dropped</span>
            <span class="count text-xs text-slate-500">1</span>
          </button>
          <button data-status="planning"
            class="flex items-center justify-between px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 transition-colors border-l-4 border-transparent">
            <span>Planning</span>
            <span class="count text-xs text-slate-500">2</span>
          </button>
        </div>
      </div>

    </div>
  </aside>

  <!-- Right Column: Content (80%) -->
  <div class="lg:w-[80%] order-1 lg:order-2 space-y-8">
    <div id="manga-list-container" class="space-y-10">
      <div class="flex items-center justify-center p-20">
        <i class="fa-solid fa-circle-notch fa-spin text-accent text-2xl"></i>
      </div>
    </div>
  </div>
</div>
